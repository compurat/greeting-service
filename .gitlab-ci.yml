stages:
  - build
  - docker-build
  - deploy

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "web"

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  # GitLab Container Registry configuratie
  REGISTRY_IMAGE: $CI_REGISTRY_IMAGE
  # Standaard keuze voor alle services, maar kan handmatig worden overschreven in GitLab UI
  DEPLOY_SERVICE:
    value: "all"
    options:
      - "all"
      - "good-morning-service"
      - "good-evening-service"
      - "good-night-service"
    description: "Kies de service die je wilt deployen"

# 1. Maven build voor alle services
maven-build:
  stage: build
  image: maven:3.9.9-eclipse-temurin-17
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - "**/target/*.jar"
    expire_in: 1 hour

# 2. Docker images bouwen en pushen
docker-build:
  stage: docker-build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  parallel:
    matrix:
      - SERVICE: ["good-morning-service", "good-evening-service", "good-night-service"]
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - |
      docker build --build-arg SERVICE=${SERVICE} -t ${REGISTRY_IMAGE}/${SERVICE}:${CI_COMMIT_SHA} -t ${REGISTRY_IMAGE}/${SERVICE}:latest .
    - docker push ${REGISTRY_IMAGE}/${SERVICE}:${CI_COMMIT_SHA}
    - docker push ${REGISTRY_IMAGE}/${SERVICE}:latest
  rules:
    - if: '$DEPLOY_SERVICE == "all" || $DEPLOY_SERVICE == $SERVICE'

# 3. Deploy naar Kubernetes via Rancher
deploy:
  stage: deploy
  image: bitnami/kubectl:latest
  parallel:
    matrix:
      - SERVICE: ["good-morning-service", "good-evening-service", "good-night-service"]
  before_script:
    # Zorg dat de kubeconfig aanwezig is (wordt verwacht als CI/CD variabele KUBECONFIG)
    - mkdir -p ~/.kube
    - echo "$RANCHER_KUBECONFIG" > ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    # Update de images in de manifests naar de zojuist gebouwde versies
    - |
      sed -i "s|image: ${SERVICE}:latest|image: ${REGISTRY_IMAGE}/${SERVICE}:${CI_COMMIT_SHA}|g" k8s/${SERVICE}.yaml
    # Pas de manifests toe
    - kubectl apply -f k8s/${SERVICE}.yaml
    # Zorg dat de gateway wordt toegepast (als die er is)
    - |
      if [ -f "k8s/gateway.yaml" ]; then
        kubectl apply -f k8s/gateway.yaml
        kubectl rollout restart deployment/gateway-service || true
      fi
    # Forceer een rollout van de specifieke service
    - kubectl rollout restart deployment/${SERVICE} || true
  environment:
    name: production
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && ($DEPLOY_SERVICE == "all" || $DEPLOY_SERVICE == $SERVICE)'
