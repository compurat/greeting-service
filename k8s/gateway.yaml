apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    http {
        resolver 10.96.0.10;

        server {
            listen 8082;

            location /greeting {
                set $backend_host "";
                set $new_uri "";

                if ($arg_time = "morning") {
                    set $backend_host "good-morning-service.default.svc.cluster.local:80";
                    set $new_uri "/greeting/good-morning";
                }
                if ($arg_time = "evening") {
                    set $backend_host "good-evening-service.default.svc.cluster.local:80";
                    set $new_uri "/greeting/good-evening";
                }
                if ($arg_time = "night") {
                    set $backend_host "good-night-service.default.svc.cluster.local:80";
                    set $new_uri "/greeting/good-night";
                }
                
                if ($backend_host = "") {
                    return 400 "Ongeldige of ontbrekende 'time' parameter. Gebruik morning, evening of night.\n";
                }

                rewrite ^ $new_uri break;
                proxy_pass http://$backend_host;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8082
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
      volumes:
      - name: config
        configMap:
          name: gateway-config
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
spec:
  type: LoadBalancer
  selector:
    app: gateway-service
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
